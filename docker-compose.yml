# Full stack in one command:  docker compose up --build
# Services share the repo as a volume so artifacts (models, reports, mlflow db)
# produced by the pipeline are visible to the API and dashboard.
services:
  pipeline:
    build: .
    env_file: .env
    command: >
      sh -c "python -m realestate.pipeline && python -m realestate.build_artifacts"
    volumes:
      - .:/app

  api:
    build: .
    env_file: .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      pipeline:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build: .
    env_file: .env
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      pipeline:
        condition: service_completed_successfully

  scheduler:
    build: .
    env_file: .env
    command: python -m realestate.scheduler
    volumes:
      - .:/app
    depends_on:
      pipeline:
        condition: service_completed_successfully
    restart: unless-stopped
